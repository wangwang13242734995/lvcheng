apiVersion: apps/v1
kind: Deployment
metadata:
  name: lvcheng-app
  labels:
    app: lvcheng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lvcheng
  template:
    metadata:
      labels:
        app: lvcheng
    spec:
      containers:
        - name: lvcheng
          image: docker.io/library/node:20-alpine
          workingDir: /app
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lvcheng-secrets
                  key: database-url
            - name: NEXTAUTH_URL
              value: "https://{{SEALOS_DOMAIN}}"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: lvcheng-secrets
                  key: nextauth-secret
            - name: NODE_ENV
              value: production
          command: ["sh", "-c"]
          args:
            - |
              npm ci --legacy-peer-deps
              npx prisma generate
              npm run build
              npm start
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lvcheng-service
spec:
  type: ClusterIP
  selector:
    app: lvcheng
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lvcheng-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: "{{SEALOS_DOMAIN}}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lvcheng-service
                port:
                  number: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: lvcheng-secrets
type: Opaque
data:
  database-url: "{{BASE64_DATABASE_URL}}"
  nextauth-secret: "{{BASE64_NEXTAUTH_SECRET}}"
